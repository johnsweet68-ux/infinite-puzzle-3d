name: Fetch surfaces & HDRI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch CC0 surfaces + HDRI, upload to R2
    runs-on: ubuntu-latest
    env:
      BUCKET: infinite-puzzle-assets
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Find account
        run: |
          ACCOUNT_ID=$(curl -sf https://api.cloudflare.com/client/v4/accounts \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')
          [ -n "$ACCOUNT_ID" ] || { echo "::error::Cannot read account."; exit 1; }
          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"

      - name: Download ambientCG PBR sets (CC0)
        run: |
          mkdir -p work/out
          fetch_surface() { # $1=assetId  $2=out prefix
            META=$(curl -sf "https://ambientcg.com/api/v2/full_json?id=$1&include=downloadData")
            LINK=$(echo "$META" | jq -r '.foundAssets[0].downloadFolders.default.downloadFiletypeCategories.zip.downloads[] | select(.attribute=="2K-JPG") | .downloadLink' | head -1)
            [ -n "$LINK" ] && [ "$LINK" != "null" ] || { echo "::error::No 2K-JPG download for $1"; exit 1; }
            curl -sfL "$LINK" -o "work/$1.zip"
            mkdir -p "work/$1" && unzip -oq "work/$1.zip" -d "work/$1"
            cp work/$1/*_Color.jpg    "work/out/$2_color.jpg"
            cp work/$1/*_NormalGL.jpg "work/out/$2_normal.jpg" || true
            cp work/$1/*_Roughness.jpg "work/out/$2_rough.jpg" || true
            echo "| surfaces/$2 | ambientCG | CC0 | https://ambientcg.com/view?id=$1 | $(date +%F) |" >> work/credits_rows.txt
          }
          fetch_surface WoodFloor043 wood_floor_01
          fetch_surface Plaster001 plaster_01
          ls -la work/out

      - name: Download Poly Haven interior HDRI (CC0, one-time file fetch)
        run: |
          curl -sfL "https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/lebombo_2k.hdr" -o work/out/interior_day_01.hdr
          ls -la work/out/interior_day_01.hdr
          echo "| lighting/interior_day_01.hdr | Poly Haven | CC0 | https://polyhaven.com/a/lebombo | $(date +%F) |" >> work/credits_rows.txt

      - name: Upload to R2
        run: |
          npm install -g wrangler >/dev/null 2>&1
          for f in work/out/*_color.jpg work/out/*_normal.jpg work/out/*_rough.jpg; do
            [ -e "$f" ] || continue
            key="surfaces/$(basename "$f")"
            npx wrangler r2 object put "$BUCKET/$key" --file "$f" --content-type image/jpeg --remote
          done
          npx wrangler r2 object put "$BUCKET/lighting/interior_day_01.hdr" --file work/out/interior_day_01.hdr --content-type application/octet-stream --remote
          echo "## Surfaces & HDRI uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls work/out | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"

      - name: Append CREDITS.md & commit
        run: |
          while IFS= read -r row; do
            key=$(echo "$row" | cut -d"|" -f2 | xargs)
            grep -qF "| $key |" CREDITS.md || echo "$row" >> CREDITS.md
          done < work/credits_rows.txt
          git config user.name "asset-pipeline[bot]"
          git config user.email "asset-pipeline@users.noreply.github.com"
          git add CREDITS.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: log CC0 surfaces + HDRI in CREDITS.md"
            git pull --rebase origin main && git push origin HEAD:main
          fi
