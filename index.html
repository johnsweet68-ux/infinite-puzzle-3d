<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Infinite Puzzle — Phase A</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
    #renderCanvas { width: 100vw; height: 100vh; display: block; touch-action: none; outline: none; }
    #loading {
      position: fixed; inset: 0; background: #05070a; z-index: 50;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      font-family: ui-monospace, monospace; color: #6fd8cf; letter-spacing: 0.4em;
      transition: opacity 1.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-text { font-size: 14px; margin-bottom: 20px; }
    #bar { width: 260px; height: 2px; background: rgba(111, 216, 207, 0.15); }
    #fill { width: 0%; height: 100%; background: #6fd8cf; box-shadow: 0 0 14px #6fd8cf; transition: width 0.3s; }
    #instructions {
      position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
      font-family: ui-monospace, monospace; color: rgba(180, 230, 220, 0.5);
      letter-spacing: 0.26em; font-size: 11px; text-transform: uppercase;
      pointer-events: none; user-select: none; text-shadow: 0 0 10px rgba(0,0,0,0.85);
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="loading">
    <div id="loading-text">ENTERING THE CHAMBER</div>
    <div id="bar"><div id="fill"></div></div>
  </div>
  <div id="instructions">WASD move · mouse look · click to capture</div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script>
    (function() {
      "use strict";
      
      // ═══════════════════════════════════════════════════════════
      // THE INFINITE PUZZLE — Phase A Scaffold
      // Based on babylon-pipeline.html reference patterns
      // ═══════════════════════════════════════════════════════════
      
      const fillEl = document.getElementById('fill');
      const loadingEl = document.getElementById('loading');
      function setProgress(p) { fillEl.style.width = Math.min(100, p) + '%'; }
      
      // Colors from the aesthetic spec
      const TEAL = new BABYLON.Color3(0.16, 0.92, 0.85);
      const RED = new BABYLON.Color3(0.90, 0.12, 0.14);
      const COLD = new BABYLON.Color3(0.55, 0.62, 0.85);
      const GATE = new BABYLON.Color3(1.0, 0.35, 0.15); // breach/orange
      
      const canvas = document.getElementById('renderCanvas');
      const engine = new BABYLON.Engine(canvas, true, { stencil: true, antialias: true });
      const scene = new BABYLON.Scene(engine);
      
      // Dark corrupted atmosphere
      scene.clearColor = new BABYLON.Color3(0.01, 0.018, 0.026);
      scene.collisionsEnabled = true;
      scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
      scene.fogColor = new BABYLON.Color3(0.04, 0.07, 0.09);
      scene.fogDensity = 0.04;
      
      setProgress(10);
      
      // ── HDR IBL — image-based lighting (key for realism) ──
      var env = BABYLON.CubeTexture.CreateFromPrefilteredData(
        'https://assets.babylonjs.com/environments/night.env', scene);
      scene.environmentTexture = env;
      scene.environmentIntensity = 0.5;
      setProgress(25);
      
      // ── FIRST-PERSON CAMERA ──
      var camera = new BABYLON.UniversalCamera(
        'fps', new BABYLON.Vector3(0, 1.7, 5), scene);
      camera.setTarget(new BABYLON.Vector3(0, 1.7, 0));
      camera.attachControl(canvas, true);
      camera.speed = 0.25;
      camera.angularSensibility = 3600;
      camera.minZ = 0.05;
      camera.fov = 1.0;
      // WASD + arrow keys
      camera.keysUp = [87, 38];
      camera.keysDown = [83, 40];
      camera.keysLeft = [65, 37];
      camera.keysRight = [68, 39];
      camera.checkCollisions = true;
      camera.applyGravity = false;
      camera.ellipsoid = new BABYLON.Vector3(0.5, 0.85, 0.5);
      
      // Pointer lock on click
      canvas.addEventListener('click', function() {
        if (canvas.requestPointerLock) canvas.requestPointerLock();
      });
      
      setProgress(35);
      
      // ── CHAMBER SHELL (placeholder — will be replaced with real assets) ──
      // Using a simple room to prove the walkthrough works
      const W = 12, H = 4, D = 14;
      
      // PBR materials for the room
      var wallMat = new BABYLON.PBRMaterial('wall', scene);
      wallMat.albedoColor = new BABYLON.Color3(0.06, 0.065, 0.07);
      wallMat.metallic = 0;
      wallMat.roughness = 0.92;
      
      var floorMat = new BABYLON.PBRMaterial('floor', scene);
      floorMat.albedoColor = new BABYLON.Color3(0.04, 0.04, 0.05);
      floorMat.metallic = 0.1;
      floorMat.roughness = 0.75;
      
      // Floor
      var floor = BABYLON.MeshBuilder.CreateGround('floor', { width: W, height: D }, scene);
      floor.material = floorMat;
      floor.receiveShadows = true;
      floor.checkCollisions = true;
      
      // Ceiling
      var ceil = BABYLON.MeshBuilder.CreateGround('ceil', { width: W, height: D }, scene);
      ceil.position.y = H;
      ceil.rotation.x = Math.PI;
      ceil.material = wallMat;
      
      // Walls (using planes)
      function createWall(name, w, h, pos, rotY) {
        var wall = BABYLON.MeshBuilder.CreatePlane(name, { width: w, height: h, sideOrientation: BABYLON.Mesh.DOUBLESIDE }, scene);
        wall.position = pos;
        if (rotY) wall.rotation.y = rotY;
        wall.material = wallMat;
        wall.receiveShadows = true;
        wall.checkCollisions = true;
        return wall;
      }
      
      // Back, front, left, right walls
      createWall('back', W, H, new BABYLON.Vector3(0, H/2, -D/2), 0);
      createWall('front', W, H, new BABYLON.Vector3(0, H/2, D/2), Math.PI);
      createWall('left', D, H, new BABYLON.Vector3(-W/2, H/2, 0), Math.PI/2);
      createWall('right', D, H, new BABYLON.Vector3(W/2, H/2, 0), -Math.PI/2);
      
      setProgress(45);
      
      // ── LIGHTING ──
      var ambient = new BABYLON.HemisphericLight('ambient', new BABYLON.Vector3(0, 1, 0), scene);
      ambient.intensity = 0.12;
      ambient.diffuse = COLD;
      ambient.groundColor = new BABYLON.Color3(0.04, 0.03, 0.03);
      
      // Shadow-casting key light
      var keyLight = new BABYLON.DirectionalLight('key', new BABYLON.Vector3(-0.5, -0.8, 0.3), scene);
      keyLight.position = new BABYLON.Vector3(5, 8, -5);
      keyLight.intensity = 1.8;
      keyLight.diffuse = new BABYLON.Color3(0.9, 0.85, 0.8);
      
      var shadowGen = new BABYLON.ShadowGenerator(1024, keyLight);
      shadowGen.usePercentageCloserFiltering = true;
      shadowGen.filteringQuality = BABYLON.ShadowGenerator.QUALITY_MEDIUM;
      shadowGen.darkness = 0.4;
      
      // ── CORRUPTION GLOW LIGHTS ──
      // Teal breach glow
      var breachGlow = new BABYLON.PointLight('breachGlow', new BABYLON.Vector3(0, 2, -D/2 + 0.5), scene);
      breachGlow.diffuse = TEAL;
      breachGlow.intensity = 15;
      breachGlow.range = 18;
      
      // Red accent
      var redGlow = new BABYLON.PointLight('redGlow', new BABYLON.Vector3(4, 2.5, 2), scene);
      redGlow.diffuse = RED;
      redGlow.intensity = 8;
      redGlow.range = 14;
      
      setProgress(55);
      
      // ── BREACH (tear between realities) ──
      var breach = BABYLON.MeshBuilder.CreateDisc('breach', { radius: 1.2, tessellation: 24 }, scene);
      breach.position = new BABYLON.Vector3(0, 2, -D/2 + 0.12);
      // Add some random displacement for organic feel
      var breachVerts = breach.getVerticesData(BABYLON.VertexBuffer.PositionKind);
      for (var v = 0; v < breachVerts.length; v += 3) {
        breachVerts[v + 2] += (Math.random() - 0.5) * 0.2;
      }
      breach.updateVerticesData(BABYLON.VertexBuffer.PositionKind, breachVerts);
      
      var breachMat = new BABYLON.PBRMaterial('breachMat', scene);
      breachMat.emissiveColor = TEAL;
      breachMat.albedoColor = new BABYLON.Color3(0.05, 0.15, 0.12);
      breach.material = breachMat;
      
      // Glow layer for emissive surfaces
      var glow = new BABYLON.GlowLayer('glow', scene, { blurKernelSize: 48 });
      glow.intensity = 0.8;
      
      setProgress(65);
      
      // ── PARTICLES: SPORES ──
      var sporeTex = (function() {
        var t = new BABYLON.DynamicTexture('sporeTex', 64, scene, false);
        var c = t.getContext();
        var g = c.createRadialGradient(32, 32, 0, 32, 32, 32);
        g.addColorStop(0, 'rgba(255,255,255,1)');
        g.addColorStop(0.4, 'rgba(255,255,255,0.5)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        c.fillStyle = g;
        c.fillRect(0, 0, 64, 64);
        t.update();
        t.hasAlpha = true;
        return t;
      })();
      
      var spores = new BABYLON.ParticleSystem('spores', 600, scene);
      spores.particleTexture = sporeTex;
      spores.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
      spores.emitter = new BABYLON.Vector3(0, H - 0.5, 0);
      spores.minEmitBox = new BABYLON.Vector3(-W/2, -1, -D/2);
      spores.maxEmitBox = new BABYLON.Vector3(W/2, 1, D/2);
      spores.color1 = new BABYLON.Color4(0.7, 0.95, 0.9, 0.4);
      spores.color2 = new BABYLON.Color4(0.8, 0.85, 0.7, 0.25);
      spores.colorDead = new BABYLON.Color4(0.2, 0.3, 0.35, 0);
      spores.minSize = 0.02;
      spores.maxSize = 0.08;
      spores.minLifeTime = 8;
      spores.maxLifeTime = 18;
      spores.emitRate = 50;
      spores.direction1 = new BABYLON.Vector3(-0.05, -0.1, -0.05);
      spores.direction2 = new BABYLON.Vector3(0.05, -0.02, 0.05);
      spores.minEmitPower = 0.03;
      spores.maxEmitPower = 0.1;
      spores.gravity = new BABYLON.Vector3(0, -0.04, 0);
      spores.start();
      
      setProgress(75);
      
      // ── POST-PROCESSING ──
      // SSAO (ambient occlusion) — guarded by try/catch for compatibility
      try {
        if (BABYLON.SSAO2RenderingPipeline && BABYLON.SSAO2RenderingPipeline.IsSupported) {
          var ssao = new BABYLON.SSAO2RenderingPipeline('ssao', scene, { ssaoRatio: 0.7, blurRatio: 1 }, [camera]);
          ssao.radius = 0.9;
          ssao.totalStrength = 1.0;
          ssao.expensiveBlur = true;
          ssao.samples = 12;
          ssao.maxZ = 60;
        }
      } catch (e) { console.warn('SSAO skipped:', e); }
      
      // Default rendering pipeline (bloom, tone mapping, vignette, grain, chromatic aberration)
      var pipeline = new BABYLON.DefaultRenderingPipeline('pipeline', true, scene, [camera]);
      pipeline.fxaaEnabled = true;
      pipeline.bloomEnabled = true;
      pipeline.bloomThreshold = 0.65;
      pipeline.bloomWeight = 0.5;
      pipeline.bloomKernel = 64;
      
      // Tone mapping (ACES for film-like look)
      pipeline.imageProcessing.toneMappingEnabled = true;
      pipeline.imageProcessing.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
      pipeline.imageProcessing.exposure = 1.1;
      pipeline.imageProcessing.contrast = 1.25;
      
      // Vignette
      pipeline.imageProcessing.vignetteEnabled = true;
      pipeline.imageProcessing.vignetteWeight = 3.0;
      pipeline.imageProcessing.vignetteColor = new BABYLON.Color4(0, 0, 0, 1);
      
      // Film grain
      pipeline.grainEnabled = true;
      pipeline.grain.intensity = 7;
      pipeline.grain.animated = true;
      
      // Chromatic aberration
      pipeline.chromaticAberrationEnabled = true;
      pipeline.chromaticAberration.aberrationAmount = 10;
      pipeline.chromaticAberration.radialIntensity = 0.7;
      
      // Color curves — teal shadows, warm highlights
      pipeline.imageProcessing.colorCurvesEnabled = true;
      var curves = new BABYLON.ColorCurves();
      curves.shadowsHue = 180;
      curves.shadowsDensity = 30;
      curves.shadowsSaturation = 20;
      curves.highlightsHue = 35;
      curves.highlightsDensity = 15;
      pipeline.imageProcessing.colorCurves = curves;
      
      setProgress(85);
      
      // ── ANIMATION LOOP ──
      var time = 0;
      scene.registerBeforeRender(function() {
        var dt = engine.getDeltaTime() / 1000;
        time += dt;
        
        // Keep camera at eye level
        if (camera.position.y !== 1.7) camera.position.y = 1.7;
        
        // Corruption lights breathe
        breachGlow.intensity = 14 + Math.sin(time * 1.3) * 5;
        redGlow.intensity = 7 + Math.sin(time * 0.9 + 1.5) * 3;
        
        // Breach pulses
        var pulse = 0.8 + Math.sin(time * 2.0) * 0.25;
        breachMat.emissiveColor = TEAL.scale(pulse);
      });
      
      setProgress(95);
      
      // Hide loading screen
      setTimeout(function() {
        loadingEl.classList.add('hidden');
        setProgress(100);
      }, 500);
      
      // ── RENDER LOOP ──
      engine.runRenderLoop(function() {
        scene.render();
      });
      
      window.addEventListener('resize', function() {
        engine.resize();
      });
      
      console.log('[The Infinite Puzzle] Phase A scaffold · Babylon.js v' + BABYLON.Engine.Version);
    })();
  </script>
</body>
</html>
