<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Infinite Puzzle</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div class="loading-content">
      <div class="loading-text">ENTERING THE REALITY</div>
      <div class="bar"><div id="fill"></div></div>
    </div>
  </div>
  
  <!-- In-Game HUD -->
  <div id="hud" class="hud hidden">
    <div class="hud-top">
      <span id="world-title">Modern Apartment</span>
    </div>
    <div class="hud-bottom">
      <span class="controls">WASD move · mouse look · E interact</span>
    </div>
  </div>
  
  <!-- Interaction Prompt -->
  <div id="interact-prompt" class="interact-prompt hidden">
    <span>Press E to enter the rift</span>
  </div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>
  <script src="js/assets.js"></script>
    <script src="js/worlds.js"></script>
  <script src="js/player.js"></script>
  <script src="js/rift.js"></script>
  <script src="js/graphics.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
